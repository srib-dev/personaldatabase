services:
  app:
    build: .
    secrets:
      - jwt_private_key
      - jwt_public_key
    secrets:
      jwt_private_key:
        file: ./jwt_private_key.pem
      jwt_public_key:
        file: ./jwt_public_key.pem
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: unless-stopped
